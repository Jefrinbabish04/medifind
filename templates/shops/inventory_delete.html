{% extends "base_shop.html" %}
{% block title %}Delete Inventory • MediFind Shop{% endblock %}

{% block content %}
  <div class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card card-soft p-4">
          <h3 class="fw-bold mb-2">Delete inventory item?</h3>
          <div class="text-muted">
            You are about to delete <span class="fw-semibold">{{ inventory.medicine.name }}</span> from your inventory.
          </div>

          <form method="POST" class="mt-4">
            {% csrf_token %}
            <div class="d-flex gap-2">
              <button class="btn btn-danger" type="submit">
                <i class="bi bi-trash me-1"></i>Delete
              </button>
              <a class="btn btn-outline-secondary" href="{% url 'shop_inventory_list' %}">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
